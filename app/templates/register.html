<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLRS - Create Account</title>
    <style>
        body {
            background-color: #1a1c29;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .phone-frame {
            background: #ffffff;
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background-color: #1e5631;
            color: white;
            text-align: center;
            padding: 25px 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: #d4edda;
        }
        .form-container {
            padding: 30px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 22px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #f8f9fa;
        }
        input:focus {
            border-color: #1e5631;
            outline: none;
            background-color: #fff;
        }
        button {
            width: 100%;
            background: #1e5631;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background: #143d22;
        }
        .divider {
            text-align: center;
            border-bottom: 1px solid #dcdde1;
            line-height: 0.1em;
            margin: 25px 0 20px 0;
            color: #b2bec3;
            font-size: 12px;
        }
        .divider span {
            background: #fff;
            padding: 0 10px;
        }
        .footer-link {
            text-align: center;
            font-size: 13px;
            color: #636e72;
        }
        .footer-link a {
            color: #1e5631;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 13px;
        }
        .alert-danger { background: #f8d7da; color: #721c24; }
        .alert-warning { background: #fff3cd; color: #856404; }
        .alert-success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="header">
            <h1>☕ COLRS</h1>
            <p>Campus Cafeteria Ordering</p>
        </div>

        <div class="form-container">
            <h2>Create Account</h2>
            <div class="subtitle">Join COLRS to order and earn points</div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" onsubmit="return validatePassword()">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="student@usiu.ac.ke">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm_password" required placeholder="Confirm your password">
                </div>

                <button type="submit">Create Account &rarr;</button>
            </form>

            <div class="divider"><span>or</span></div>

            <div class="footer-link">
                Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
            </div>
        </div>
    </div>

    <script>
        function validatePassword() {
            var pass = document.getElementById("password").value;
            var confirmPass = document.getElementById("confirm_password").value;
            if (pass !== confirmPass) {
                alert("Passwords do not match!");
                return false;
            }
            return true;
        }
    </script>

</body>
</html>
