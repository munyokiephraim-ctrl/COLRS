<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLRS - Campus Cafeteria</title>
    <!-- Bootstrap CDN for professional styling without writing CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('menu') }}">COLRS</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('menu') }}">Menu</a>
                <a class="nav-link" href="{{ url_for('cart_view') }}">Cart</a>
            </div>
        </div>
    </nav>

    <!-- Content Block (Where menu.html/cart.html will appear) -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
